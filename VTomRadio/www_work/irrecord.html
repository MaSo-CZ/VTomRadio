<div id="logo" class="ls"></div>
<h2 class="irtitle">IR Recorder</h2>
<div class="playerwrap">
  <div class="irwrap">
    <div id="irremote">

      <div class="irbutton red power">POWER</div>
      <div class="irblank"></div>

      <div class="irbutton blue playstop">PLAY / STOP</div>
      <div class="irbutton blue backbtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M5.82843 6.99955L8.36396 9.53509L6.94975 10.9493L2 5.99955L6.94975 1.0498L8.36396 2.46402L5.82843 4.99955H13C17.4183 4.99955 21 8.58127 21 12.9996C21 17.4178 17.4183 20.9996 13 20.9996H4V18.9996H13C16.3137 18.9996 19 16.3133 19 12.9996C19 9.68584 16.3137 6.99955 13 6.99955H5.82843Z">
          </path>
        </svg>
      </div>

      <div class="irbutton blue">CH -</div>
      <div class="irbutton blue">LIST</div>
      <div class="irbutton blue">CH +</div>

      <div class="irbutton blue">VOL -</div>
      <div class="irbutton blue">MODE</div>
      <div class="irbutton blue">VOL +</div>

      <div class="irbutton blue">1</div>
      <div class="irbutton blue">2</div>
      <div class="irbutton blue">3</div>

      <div class="irbutton blue">4</div>
      <div class="irbutton blue">5</div>
      <div class="irbutton blue">6</div>

      <div class="irbutton blue">7</div>
      <div class="irbutton blue">8</div>
      <div class="irbutton blue">9</div>

      <div class="irblank"></div>
      <div class="irbutton blue">0</div>

    </div><!--irremote-->
    <div id="irform">
      <div id="irstartrecord">
        <h3>Welcome to IR Recorder!</h3>
        Press the button on the left<br />to record the code.
        <a href="/" class="button fb" id="done_ir">DONE</a>
      </div>
      <div id="irrecord" class="hidden">
        <h3 id="irrecordtitle"></h3>
        <form id="irrecordfields">
          <div class="irrecordrow">
            <div class="irradio" data-id="0"><span></span></div>
            <div class="irrecordvalue">0xAF00B5</div>
            <div class="irclear" onclick="irClear(this)"></div>
          </div>
          <div class="irrecordrow">
            <div class="irradio" data-id="1"><span></span></div>
            <div class="irrecordvalue"></div>
            <div class="irclear" onclick="irClear(this)"></div>
          </div>
          <div class="irrecordrow">
            <div class="irradio" data-id="2"><span></span></div>
            <div class="irrecordvalue"></div>
            <div class="irclear" onclick="irClear(this)"></div>
          </div>
        </form>
        <div id="protocol"></div>
        <div class="button fb hl" id="back_ir" onclick="backRecord()">Back</div>
      </div>
    </div><!--irform-->
  </div><!--irwrap-->
</div><!--playerwrap-->
<div class="ircsvactions">
  <button type="button" class="button fb" id="ir_export_csv">Export CSV</button>
  <label class="button fb" id="ir_import_csv_label" for="ir_import_csv">Import CSV</label>
  <input type="file" id="ir_import_csv" accept=".csv,text/csv" />
</div>
<div id="ircsvstatus"></div>
<div id="copy">powered by <a target="_blank" href="https://github.com/VaraiTamas/VTomRadio.git">VTom Radio</a><span id="version"></span></div>
