<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Volume Curve</title>
  <script type="text/javascript" src="variables.js"></script>
  <link rel="stylesheet" href="theme.css" type="text/css" />
  <link rel="stylesheet" href="style.css" type="text/css" />
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
    }

    .theme-page {
      max-width: 580px;
      margin: 0 auto;
      padding: 0 12px 12px 12px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .theme-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 12px 0 0;
    }

    #curveSection {
      margin: 10px 0;
      padding: 22px 16px 16px 16px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .curve-actions {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--section-border);
      margin-bottom: 8px;
    }

    .curve-actions-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .curve-actions-col-right {
      align-items: flex-end;
    }

    .curve-actions-col .fb {
      width: 226px;
      box-sizing: border-box;
      text-align: center;
      white-space: nowrap;
      margin: 0;
    }

    .curve-actions-bottom {
      display: flex;
      justify-content: center;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .curve-actions-bottom .fb {
      width: 226px;
      box-sizing: border-box;
      text-align: center;
      margin: 0;
    }

    .curve-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 6px 2px 2px;
      scrollbar-color: var(--section-border) var(--main-bg-color);
      scrollbar-width: thin;
    }

    .curve-scroll::-webkit-scrollbar {
      width: 5px;
      height: 8px;
      background-color: var(--main-bg-color);
    }

    .curve-scroll::-webkit-scrollbar-thumb {
      background: var(--section-border);
    }

    #note { color: var(--main-text-color); opacity: 0.86; margin: 4px 0 10px 0; }
    .curve-row { background: var(--odd-bg-color); border: 1px solid var(--input-border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .curve-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .curve-label { color: var(--main-hl-color); font-weight: 600; }
    .curve-val { color: var(--main-text-color); min-width: 70px; text-align: right; }
    .curve-row input[type="range"] { width: 100%; }
    #fixedzero { padding: 8px 10px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--odd-bg-color); margin-bottom: 8px; color: var(--main-text-color); }

    @media (max-width: 560px) {
      .theme-page {
        padding: 0 6px 8px 6px;
      }

      .theme-shell {
        padding: 8px 4px 0 0;
      }

      #curveSection {
        padding: 22px 10px 10px 10px;
      }

      .curve-actions {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .curve-actions-col,
      .curve-actions-col-right {
        align-items: stretch;
      }

      .curve-actions-col .fb {
        width: 100%;
      }

      .curve-actions-bottom .fb {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="theme-page">
    <div id="logo" class="ls"></div>
    <h2 class="pagetitle" style="padding:0;">Volume Curve</h2>
    <div class="theme-shell">
      <section id="curveSection">
        <div class="title"><span>volume curve (1..21)</span></div>
        <div class="curve-actions">
          <div class="curve-actions-col">
            <button class="fb local" onclick="saveCurveCsv()">Save CSV</button>
            <button class="fb local" onclick="resetBaseCurve()">Reset base curve</button>
          </div>
          <div class="curve-actions-col curve-actions-col-right">
            <a class="fb local" href="/volcurve.csv" download>Export CSV</a>
            <label class="fb local" for="curvefile">Import CSV</label>
            <input type="file" id="curvefile" accept=".csv,text/csv" hidden>
          </div>
        </div>
        <div class="curve-actions-bottom">
          <button class="fb local" onclick="window.location.href='/'">Back to player</button>
        </div>
        <div class="curve-scroll">
          <p id="note">Step 0 is fixed silent output. Steps 1..21 are adjustable from -60 dB to 0 dB.</p>
          <div id="fixedzero">Step 0: fixed (silent)</div>
          <div id="rows"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const hostname = window.location.hostname;
    let websocket = null;

    function wsSend(message) {
      if (!message) return;
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(message);
      }
    }

    function fillSlider(slider) {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const val = Number(slider.value);
      const pct = ((val - min) / (max - min)) * 100;
      slider.style.background = 'linear-gradient(to right, var(--accent-dark) 0%, var(--accent-dark) ' + pct + '%, var(--odd-bg-color) ' + pct + '%, var(--odd-bg-color) 100%)';
    }

    function setupRows() {
      const rows = document.getElementById('rows');
      rows.innerHTML = '';
      for (let i = 1; i <= 21; i++) {
        const row = document.createElement('div');
        row.className = 'curve-row';
        row.innerHTML =
          '<div class="curve-row-head">' +
            '<div class="curve-label">Step ' + i + '</div>' +
            '<div class="curve-val" id="vc' + i + 'info">0 dB</div>' +
          '</div>' +
          '<input type="range" id="vc' + i + '" min="-60" max="0" step="1" value="0">';
        rows.appendChild(row);

        const slider = document.getElementById('vc' + i);
        slider.addEventListener('input', () => {
          applyMonotonicEdit(i, Number(slider.value), true);
        });
      }
    }

    function setSliderValue(step, value) {
      const slider = document.getElementById('vc' + step);
      const info = document.getElementById('vc' + step + 'info');
      if (!slider) return;
      slider.value = value;
      if (info) info.innerText = slider.value + ' dB';
      fillSlider(slider);
    }

    function applyMonotonicEdit(step, requestedValue, sendWs) {
      let value = requestedValue;
      if (step > 1) {
        const above = Number(document.getElementById('vc' + (step - 1)).value);
        if (value < above) value = above;
      }

      setSliderValue(step, value);
      if (sendWs) wsSend('vcurve' + step + '=' + value);

      let prev = value;
      for (let i = step + 1; i <= 21; i++) {
        const slider = document.getElementById('vc' + i);
        if (!slider) continue;
        let cur = Number(slider.value);
        if (cur < prev) {
          cur = prev;
          setSliderValue(i, cur);
          if (sendWs) wsSend('vcurve' + i + '=' + cur);
        }
        prev = cur;
      }
    }

    function applyPayload(payload) {
      if (!Array.isArray(payload)) return;
      payload.forEach(item => {
        if (!item || typeof item.id !== 'string') return;
        if (!item.id.startsWith('vc')) return;
        const slider = document.getElementById(item.id);
        const info = document.getElementById(item.id + 'info');
        if (!slider) return;
        slider.value = Number(item.value);
        if (info) info.innerText = slider.value + ' dB';
        fillSlider(slider);
      });
    }

    const baseCurveDb = [
      -52, -39, -32, -27, -24, -20, -18, -15, -13, -12, -10,
      -9, -8, -6, -5, -4, -4, -3, -2, -2, -1
    ];

    function resetBaseCurve() {
      if (!confirm('Reset all 1..21 steps to the derived base curve?')) return;
      for (let i = 1; i <= 21; i++) {
        const v = baseCurveDb[i - 1];
        setSliderValue(i, v);
        wsSend('vcurve' + i + '=' + v);
      }
    }

    function onMessage(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.payload) {
          applyPayload(data.payload);
        }
      } catch (e) {
      }
    }

    function initWs() {
      websocket = new WebSocket('ws://' + hostname + '/ws');
      websocket.onopen = () => wsSend('getvolcurve=1');
      websocket.onmessage = onMessage;
      websocket.onclose = () => setTimeout(initWs, 2000);
    }

    function loadLogo() {
      fetch('logo.svg', { cache: 'no-store' })
        .then(resp => (resp.ok ? resp.text() : ''))
        .then(svg => {
          if (!svg) return;
          const logo = document.getElementById('logo');
          if (logo) logo.innerHTML = svg;
        })
        .catch(() => {});
    }

    async function importCurveCsv(file) {
      if (!file) return;
      const text = await file.text();
      const res = await fetch('/volcurve.csv', {
        method: 'POST',
        headers: { 'Content-Type': 'text/csv' },
        body: text
      });
      if (!res.ok) {
        let msg = 'CSV import failed';
        try {
          const data = await res.json();
          if (data && data.error) msg = 'CSV import failed: ' + data.error;
        } catch (e) {
        }
        alert(msg);
        return;
      }
      wsSend('getvolcurve=1');
    }

    function buildCurveCsvFromUi() {
      let csv = 'step,db\n';
      for (let i = 1; i <= 21; i++) {
        const slider = document.getElementById('vc' + i);
        const value = slider ? Number(slider.value) : 0;
        csv += i + ',' + value + '\n';
      }
      return csv;
    }

    async function saveCurveCsv() {
      const csv = buildCurveCsvFromUi();
      const res = await fetch('/volcurve.csv', {
        method: 'POST',
        headers: { 'Content-Type': 'text/csv' },
        body: csv
      });
      if (!res.ok) {
        let msg = 'CSV save failed';
        try {
          const data = await res.json();
          if (data && data.error) msg = 'CSV save failed: ' + data.error;
        } catch (e) {
        }
        alert(msg);
        return;
      }
      alert('CSV saved to /data/volcurve.csv');
    }

    window.addEventListener('load', () => {
      loadLogo();
      setupRows();
      initWs();

      const input = document.getElementById('curvefile');
      input.addEventListener('change', async () => {
        try {
          if (input.files && input.files[0]) {
            await importCurveCsv(input.files[0]);
          }
        } catch (e) {
          alert('CSV import failed');
        } finally {
          input.value = '';
        }
      });
    });
  </script>
</body>
</html>
